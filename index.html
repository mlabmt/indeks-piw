<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILE - Transparentny Index Cen</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --text: #34495e; --light: #f1f2f6; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--light); color: var(--text); }
        
        /* Menu Nawigacyjne */
        nav { 
            background: white; padding: 0 5%; height: 70px; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 2000; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 600; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* App Layout */
        .main-container { display: flex; flex-direction: column; padding: 20px 5%; gap: 20px; }
        
        .app-shell { 
            display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: 700px; 
            background: white; padding: 10px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Sidebar Filters */
        .sidebar { padding: 20px; background: #fafafa; border-radius: 15px; overflow-y: auto; }
        .sidebar h3 { margin-top: 0; font-size: 18px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #95a5a6; display: block; margin: 15px 0 5px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 14px; }

        #map { height: 100%; width: 100%; border-radius: 15px; }

        /* Popup / Wizytówka Style */
        .popup-card { width: 220px; font-family: sans-serif; }
        .popup-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .popup-title { font-size: 16px; font-weight: 800; margin: 0; }
        .popup-rating { color: #f1c40f; font-size: 14px; margin: 2px 0 8px; }
        .popup-price { font-size: 20px; font-weight: 800; color: #e74c3c; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 5px; }
        .btn { 
            flex: 1; padding: 8px; border-radius: 5px; text-decoration: none; 
            font-size: 11px; text-align: center; font-weight: 700; color: white;
        }
        .btn-web { background: var(--primary); }
        .btn-route { background: var(--accent); }

        @media (max-width: 1024px) {
            .app-shell { grid-template-columns: 1fr; height: auto; }
            #map { height: 500px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">Indeks<span>piw</span></a>
    <div class="nav-links">
        <a href="#">LOKALE</a>
        <a href="#">RODZAJE PIW</a>
        <a href="#">PROMOCJE</a>
        <a href="#">O PROJEKCIE</a>
    </div>
    <div style="font-size: 12px; color: #95a5a6; font-weight: 600;"></div>
</nav>

<div class="main-container">
    <div class="app-shell">
        <div class="sidebar">
            <h3>Filtry</h3>
            <label>Miasto</label>
            <select id="f-city"><option value="all">Wszystkie Miasta</option></select>
            
            <label>Kategoria</label>
            <select id="f-cat">
                <option value="all">Wszystkie Lokale</option>
                <option value="Bar">Bary / Puby</option>
                <option value="Restauracja">Restauracje</option>
            </select>

            <label>Podanie</label>
            <select id="f-type">
                <option value="all">Dowolne</option>
                <option value="Lane">Tylko Lane</option>
                <option value="Butelka">Tylko Butelka</option>
            </select>
            
            <div style="margin-top: 30px; padding: 15px; background: #eef2f3; border-radius: 10px; font-size: 12px;">
                <strong>Widzisz błąd?</strong><br>
                Zgłoś nieprawidłowość w cenie, a my zweryfikujemy ją botem.
            </div>
        </div>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY5aTfEtqblePV5vGYDhcNXQCy9oK6AtN6kiiJIX3zyifdwKDLSWUyqB5HxEnMh6kvrTGuQy5JqDBA/pub?output=csv';
    const map = L.map('map', { minZoom: 6, maxZoom: 18 }).setView([51.9, 19.1], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allData = [];
    const markerGroup = L.layerGroup().addTo(map);

    function updateMap() {
        markerGroup.clearLayers();
        const city = document.getElementById('f-city').value;
        const cat = document.getElementById('f-cat').value;
        const type = document.getElementById('f-type').value;
        let jumpTo = null;

        allData.forEach(row => {
            if((city === 'all' || row.City === city) && (cat === 'all' || row.Category === cat) && (type === 'all' || row.Type === type)) {
                const lat = parseFloat(String(row.Lat).replace(',','.'));
                const lng = parseFloat(String(row.Lng).replace(',','.'));
                if(!jumpTo && city !== 'all') jumpTo = [lat, lng];

                const stars = "⭐".repeat(Math.round(row.Rating || 0)) || "Brak ocen";
                const img = row.Image || "https://picsum.photos/200/120?random=" + Math.random();

                L.marker([lat, lng]).bindPopup(`
                    <div class="popup-card">
                        <img src="${img}" class="popup-img">
                        <h4 class="popup-title">${row.Place}</h4>
                        <div class="popup-rating">${stars} (${row.Rating || '0.0'})</div>
                        <div style="font-size: 12px; color: #666;">${row.Beer}</div>
                        <div class="popup-price">${row.Price} zł</div>
                        <div class="btn-group">
                            <a href="${row.Website || '#'}" target="_blank" class="btn btn-web">STRONA</a>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank" class="btn btn-route">TRASA</a>
                        </div>
                    </div>
                `).addTo(markerGroup);
            }
        });

        if(city === 'all') map.flyTo([51.9, 19.1], 6, {duration: 0.8});
        else if(jumpTo) map.flyTo(jumpTo, 14, {duration: 0.8});
    }

    Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
            allData = results.data;
            const uniqueCities = [...new Set(allData.map(item => item.City).filter(Boolean))].sort();
            uniqueCities.forEach(c => {
                const o = document.createElement("option"); o.value = o.textContent = c;
                document.getElementById('f-city').appendChild(o);
            });
            updateMap();
        }
    });

    document.querySelectorAll('select').forEach(s => s.addEventListener('change', updateMap));
</script>
</body>
</html>
