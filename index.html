<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indeks Piwa - Interaktywna Mapa ILE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Panel sterowania */
        .controls { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 240px;
        }
        h2 { margin: 0 0 5px 0; font-size: 20px; color: #2c3e50; }
        p { margin: 0 0 20px 0; font-size: 13px; color: #7f8c8d; line-height: 1.4; }
        
        label { font-size: 11px; color: #34495e; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; letter-spacing: 0.5px; }
        select { 
            width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 6px; 
            border: 1px solid #dcdde1; font-size: 14px; background-color: #f9f9f9;
            outline: none; transition: border-color 0.3s;
        }
        select:focus { border-color: #3498db; }
        
        /* Popup i etykiety cen */
        .price-tag { font-weight: bold; color: #e74c3c; font-size: 1.3em; }
        .popup-content { line-height: 1.5; min-width: 150px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 8px 0; }
    </style>
</head>
<body>

<div class="controls">
    <h2>Indeks Piwa 🍺</h2>
    <p>Sprawdź realne ceny lokalnego piwa w 16 stolicach.</p>

    <label>Wybierz Miasto</label>
    <select id="filter-city">
        <option value="all">Cała Polska</option>
    </select>

    <label>Rodzaj Lokalu</label>
    <select id="filter-category">
        <option value="all">Wszystkie lokale</option>
        <option value="Bar">Bary / Puby</option>
        <option value="Restauracja">Restauracje</option>
    </select>

    <label>Sposób Podania</label>
    <select id="filter-type">
        <option value="all">Lane i Butelka</option>
        <option value="Lane">Lane</option>
        <option value="Butelka">Butelka</option>
    </select>
    
    <div style="font-size: 10px; color: #bdc3c7; text-align: center; margin-top: 10px;">
        Dane aktualizowane przez AI bota
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // 1. LINK DO TWOJEGO ARKUSZA GOOGLE (CSV)
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY5aTfEtqblePV5vGYDhcNXQCy9oK6AtN6kiiJIX3zyifdwKDLSWUyqB5HxEnMh6kvrTGuQy5JqDBA/pub?output=csv';

    // 2. INICJALIZACJA MAPY
    const map = L.map('map', {
        minZoom: 6,
        maxZoom: 18,
        zoomControl: false // Ukrywamy przyciski +/- dla czystego wyglądu (opcjonalnie)
    }).setView([51.9, 19.1], 6);

    // Ograniczenie przesuwania do okolic Polski
    const bounds = [[48.0, 13.0], [56.0, 25.0]];
    map.setMaxBounds(bounds);

    // Dodanie warstwy wizualnej mapy
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Kontener na pinezki
    let allData = [];
    const markerGroup = L.layerGroup().addTo(map);

    // 3. LOGIKA AKTUALIZACJI MAPY (FILTRY + PRZYBLIŻANIE)
    function updateMap() {
        markerGroup.clearLayers();
        
        const cityVal = document.getElementById('filter-city').value;
        const catVal = document.getElementById('filter-category').value;
        const typeVal = document.getElementById('filter-type').value;

        let firstMatchCoords = null;

        allData.forEach(row => {
            // Sprawdzanie czy wiersz pasuje do filtrów
            const matchCity = (cityVal === 'all' || row.City === cityVal);
            const matchCat = (catVal === 'all' || row.Category === catVal);
            const matchType = (typeVal === 'all' || row.Type === typeVal);

            if(matchCity && matchCat && matchType && row.Lat && row.Lng) {
                const lat = parseFloat(row.Lat.replace(',', '.'));
                const lng = parseFloat(row.Lng.replace(',', '.'));
                
                // Zapamiętaj pierwsze pasujące miejsce do wycentrowania mapy
                if (!firstMatchCoords && cityVal !== 'all') {
                    firstMatchCoords = [lat, lng];
                }

                const marker = L.marker([lat, lng]);
                marker.bindPopup(`
                    <div class="popup-content">
                        <b>${row.Place}</b><br>
                        <small>${row.Category || ''}</small>
                        <hr>
                        Piwo: <b>${row.Beer}</b><br>
                        Typ: ${row.Type}<br>
                        Cena: <span class="price-tag">${row.Price} zł</span><br>
                        <small style="color: #95a5a6;">Miasto: ${row.City}</small>
                    </div>
                `);
                markerGroup.addLayer(marker);
            }
        });

        // Płynny dolot kamery
        if (cityVal === 'all') {
            map.flyTo([51.9, 19.1], 6);
        } else if (firstMatchCoords) {
            map.flyTo(firstMatchCoords, 14); // Zbliżenie na miasto
        }
    }

    // 4. POBIERANIE DANYCH I GENEROWANIE MENU
    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            allData = results.data;
            
            // Budowanie listy miast na podstawie danych z tabeli
            const citySelect = document.getElementById('filter-city');
            const uniqueCities = [...new Set(allData.map(item => item.City).filter(Boolean))].sort();
            
            uniqueCities.forEach(city => {
                const opt = document.createElement("option");
                opt.textContent = city;
                opt.value = city;
                citySelect.appendChild(opt);
            });

            updateMap(); // Pierwsze rysowanie mapy
        }
    });

    // 5. OBSŁUGA ZMIAN W FILTRACH
    document.getElementById('filter-city').addEventListener('change', updateMap);
    document.getElementById('filter-category').addEventListener('change', updateMap);
    document.getElementById('filter-type').addEventListener('change', updateMap);

</script>

</body>
</html>
